<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hasil Quiz</title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="../../../css/global.css">
    
    <!-- QUIZ CSS -->
    <link rel="stylesheet" href="../../../css/quiz.css">
</head>

<body class="quiz-result-page">

    <div class="grid-bg"></div>
    <div class="formula-random"></div>

    <div class="container">
        <div class="card result-box">

            <h1>Hasil Quiz</h1>
            <h2 id="score" class="score"></h2>

            <div class="result-actions">
                <button class="tombol" onclick="reviewQuiz()">Lihat Penjelasan</button>
                <button class="tombol" onclick="resetQuiz()">Ulangi Quiz</button>
            </div>

        </div>
    </div>

    <script src="../../../js/global.js"></script>
    <script src="../../../js/quiz_fisika.js"></script>

</body>
</html>
