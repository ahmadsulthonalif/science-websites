<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil – Quiz Fisika</title>

    <link rel="stylesheet" href="../../../css/global.css">
    <link rel="stylesheet" href="../../../css/dashboard.css">
    <link rel="stylesheet" href="../../../css/quiz.css">

    <script src="https://kit.fontawesome.com/09024a6ff6.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body class="main-page hasil-page">

    <div class="grid-bg"></div>
    <div class="formula-random"></div>

    <!-- Spark dekorasi hasil -->
    <div class="hasil-sparks">
        <span class="hspark hs1">🏆</span>
        <span class="hspark hs2">⭐</span>
        <span class="hspark hs3">🏆</span>
        <span class="hspark hs4">⭐</span>
        <span class="hspark hs5">✨</span>
        <span class="hspark hs6">🎯</span>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar scrolled">
        <div class="nav-left">
            <span class="soal-nav-label">Hasil Quiz</span>
        </div>
        <div class="nav-center-empty">
            <div class="nav-breadcrumb">
                <span class="breadcrumb-current fisika-crumb">Fisika</span>
            </div>
        </div>
        <div class="nav-right">
            <div class="profile" id="profileBtn">
                <span id="profileInitial">A</span>
                <div class="profile-dropdown" id="profileDropdown">
                    <h4 id="usernameDisplay">Username</h4>
                    <a href="#" id="tentangKamiBtn">Tentang</a>
                    <a href="#" id="logoutBtn">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN HASIL -->
    <main class="hasil-main">

        <!-- SCORE CARD (clickable → buka panel bawah) -->
        <div class="hasil-score-card" id="scoreCard">

            <p class="hasil-label">Skor Kamu</p>

            <!-- Angka skor besar -->
            <div class="hasil-score-num">
                <span id="scoreNumber">0</span>
                <span class="hasil-score-max">/ 100</span>
            </div>

            <!-- Performa label -->
            <p id="performa" class="hasil-performa">🏆 Sempurna!</p>

            <!-- Detail benar/salah -->
            <p id="detailSkor" class="hasil-detail">— benar dari — soal</p>

            <!-- Hint klik -->
            <div class="hasil-hint">
                <i class="fa-solid fa-chevron-down hasil-chevron" id="hasilChevron"></i>
                <span>Klik untuk lihat opsi</span>
            </div>
        </div>

        <!-- PANEL DROPDOWN (muncul setelah score diklik) -->
        <div class="hasil-panel" id="reviewPanel">

            <!-- Kiri: Lihat Ulasan -->
            <button class="hasil-action-btn review-btn" onclick="reviewQuiz()">
                <span class="ha-icon">📖</span>
                <span class="ha-label">Lihat Ulasan</span>
                <span class="ha-sub">Cek jawaban tiap soal</span>
            </button>

            <!-- Kanan: Ulangi Quiz -->
            <button class="hasil-action-btn reset-btn" onclick="resetQuiz()">
                <span class="ha-icon">🔄</span>
                <span class="ha-label">Ulangi Quiz</span>
                <span class="ha-sub">Kembali ke halaman quiz</span>
            </button>

        </div>

    </main>

    <script src="../../../js/global.js"></script>
    <script src="../../../js/dashboard.js"></script>
    <script src="../../../js/quiz_fisika.js"></script>

</body>
</html>
